<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial ❤</title>
    
    <!-- Meta tags para WhatsApp -->
    <meta property="og:title" content="¡Tengo una sorpresa para vos! 🎁">
    <meta property="og:description" content="Hice esto con mucho cariño, abrilo...">
    <link rel="icon" href="https://fav.farm/❤" />

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff85a1;
            --primary-dark: #ff5c8d;
            --text: #4a4a4a;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fdfcfb;
            overflow: hidden;
        }

        /* Fondo Animado con burbujas suaves */
        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
        }

        .blob {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            filter: blur(40px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 50px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid white;
            position: relative;
            z-index: 10;
        }

        /* Corazón Pixel Art */
        .pixel-heart {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background-color: var(--primary);
            clip-path: polygon(0 30%, 0 50%, 15% 70%, 50% 100%, 85% 70%, 100% 50%, 100% 30%, 80% 10%, 60% 10%, 50% 25%, 40% 10%, 20% 10%);
            box-shadow: inset -10px -10px 0px rgba(0,0,0,0.1); 
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        h1 { color: var(--text); font-size: 22px; margin-bottom: 25px; }
        
        .message-box {
            color: #555;
            font-size: 16px;
            line-height: 1.8;
            min-height: 120px;
            margin-bottom: 20px;
        }

        .btn-open {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(255, 133, 161, 0.4);
        }

        .btn-open:hover { transform: scale(1.1); background: var(--primary-dark); }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: particleFly 3s ease-out forwards;
        }

        @keyframes particleFly {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
        <div class="blob" style="width: 250px; height: 250px; bottom: -50px; right: -50px; background: #ffcad4;"></div>
    </div>

    <!-- Si querés música, podés usar un link directo a un .mp3 aquí -->
    <!-- <audio id="musica" loop src="TU_LINK_DE_MUSICA.mp3"></audio> -->

    <div class="card">
        <div class="pixel-heart"></div>
        <h1 id="title">Tocá el botón...</h1>
        <div class="message-box" id="msg"></div>
        <button class="btn-open" id="btn">Para vos</button>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const msg = document.getElementById('msg');
        const title = document.getElementById('title');
        // const audio = document.getElementById('musica');

        const texto = "¡Feliz Cumpleaños! ❤\n\nNo sabía qué regalarte, así que decidí construirte este rinconcito digital. Sos una persona increíble y te merecés todo lo lindo del mundo.\n\n¡Te quiero muchísimo!";

        function explode() {
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.innerHTML = ['❤','✨','🌸','🎈'][Math.floor(Math.random()*4)];
                p.className = 'particle';
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.setProperty('--x', (Math.random() - 0.5) * 400 + 'px');
                p.style.setProperty('--y', (Math.random() - 0.5) * 400 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 3000);
            }
        }

        let char = 0;
        function type() {
            if (char < texto.length) {
                msg.innerHTML += texto.charAt(char) === "\n" ? "<br>" : texto.charAt(char);
                char++;
                setTimeout(type, 50);
            }
        }

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            title.innerText = "¡Feliz Cumple!";
            // if(audio) audio.play(); // Activa la música si agregás el link
            explode();
            type();
        });
    </script>
</body>
</html>
