<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Vos ❤</title>
    
    <link rel="icon" href="https://fav.farm/❤" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff85a1;
            --primary-dark: #ff5c8d;
            --text: #4a4a4a;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fdfcfb;
            overflow: hidden;
        }

        /* Fondo Animado sutil */
        .blob {
            position: absolute;
            background: var(--primary);
            filter: blur(60px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: 1;
            animation: move 15s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        /* TARJETA PRINCIPAL (CUMPLEAÑOS) */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 40px 25px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
            border: 2px solid white;
            position: relative;
            z-index: 10;
        }

        .pixel-heart {
            width: 70px; height: 70px;
            margin: 0 auto 20px;
            background-color: var(--primary);
            clip-path: polygon(0 30%, 0 50%, 15% 70%, 50% 100%, 85% 70%, 100% 50%, 100% 30%, 80% 10%, 60% 10%, 50% 25%, 40% 10%, 20% 10%);
            box-shadow: inset -6px -6px 0px rgba(0,0,0,0.1); 
            animation: floating 2.5s ease-in-out infinite;
            image-rendering: pixelated;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 { color: var(--text); font-size: 20px; margin-bottom: 15px; }
        .cumple-text { color: #555; font-size: 15px; line-height: 1.6; margin-bottom: 20px; }

        /* BOTÓN FLOTANTE (MENSAJE DIARIO) */
        .floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 133, 161, 0.3);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s;
        }

        .floating-btn:hover { transform: scale(1.05); }

        /* MODAL / OVERLAY PARA EL MENSAJE DIARIO */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal h2 { font-size: 16px; color: var(--primary); margin-top: 0; }
        .modal p { font-size: 14px; color: #444; line-height: 1.6; }
        .close-btn { 
            background: #eee; border: none; padding: 10px 20px; 
            border-radius: 15px; margin-top: 15px; cursor: pointer;
            font-family: 'Quicksand', sans-serif; font-weight: 700;
        }

        /* Partículas */
        .particle {
            position: absolute; pointer-events: none;
            z-index: 300; animation: fly 2s ease-out forwards;
        }

        @keyframes fly {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="blob" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    
    <!-- TARJETA CUMPLEAÑOS -->
    <div class="card">
        <div class="pixel-heart"></div>
        <h1>¡Feliz Cumpleaños!</h1>
        <p class="cumple-text">
            Espero que pases un día increíble. <br>
            Sos una persona muy especial para mí y te deseo lo mejor hoy y siempre. <br><br>
            ¡Te quiero mucho! ❤
        </p>
    </div>

    <!-- BOTÓN FLOTANTE -->
    <button class="floating-btn" id="dailyBtn">
        <span id="btnDate"></span> ✨
    </button>

    <!-- VENTANA DEL MENSAJE DIARIO -->
    <div class="overlay" id="overlay">
        <div class="modal">
            <h2 id="modalDate"></h2>
            <p id="dailyMsg"></p>
            <button class="close-btn" id="closeBtn">Cerrar</button>
        </div>
    </div>

    <script>
        const dailyBtn = document.getElementById('dailyBtn');
        const overlay = document.getElementById('overlay');
        const closeBtn = document.getElementById('closeBtn');
        const dailyMsg = document.getElementById('dailyMsg');
        const btnDate = document.getElementById('btnDate');
        const modalDate = document.getElementById('modalDate');

        const hoy = new Date();
        const opciones = { day: 'numeric', month: 'short' };
        btnDate.innerText = hoy.toLocaleDateString('es-ES', opciones);

        // GENERADOR DE MENSAJES (Sin "amor", "te amo", etc.)
        const intros = ["Hoy quería recordarte que ", "Nunca olvides que ", "Paso a decirte que ", "Me di cuenta de que "];
        const cualidades = ["tu forma de ser es única", "tenés una luz que ilumina todo", "sos una persona muy especial", "tu buena onda hace todo mejor", "hacés que las cosas sean más lindas"];
        const finales = [" y te quiero mucho. ✨", " y te merecés un gran día. 🌸", " y agradezco tu amistad. 😊", ". ¡Que estés muy bien! 💖"];

        function getDailyMessage() {
            const seed = hoy.getFullYear() + hoy.getMonth() + hoy.getDate();
            const i = seed % intros.length;
            const c = (seed + 1) % cualidades.length;
            const f = (seed + 2) % finales.length;
            return intros[i] + cualidades[c] + finales[f];
        }

        function explode() {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.innerHTML = '✨';
                p.className = 'particle';
                p.style.left = '50%'; p.style.top = '50%';
                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 100;
                p.style.setProperty('--mx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--my', Math.sin(angle) * dist + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        dailyBtn.addEventListener('click', () => {
            overlay.style.display = 'flex';
            modalDate.innerText = "Mensaje del " + hoy.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
            dailyMsg.innerText = getDailyMessage();
            explode();
        });

        closeBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
        });
    </script>
</body>
</html>
