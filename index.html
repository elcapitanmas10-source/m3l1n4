<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Mensaje Para Vos ❤</title>
    
    <link rel="icon" href="https://fav.farm/❤" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff85a1;
            --primary-dark: #ff5c8d;
            --text: #4a4a4a;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fdfcfb;
            overflow: hidden;
        }

        /* Blobs de fondo */
        .blob {
            position: absolute;
            background: var(--primary);
            filter: blur(60px);
            border-radius: 50%;
            opacity: 0.2;
            z-index: 1;
            animation: move 15s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 40px 25px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12);
            border: 2px solid white;
            position: relative;
            z-index: 10;
        }

        .pixel-heart {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            background-color: var(--primary);
            clip-path: polygon(0 30%, 0 50%, 15% 70%, 50% 100%, 85% 70%, 100% 50%, 100% 30%, 80% 10%, 60% 10%, 50% 25%, 40% 10%, 20% 10%);
            box-shadow: inset -6px -6px 0px rgba(0,0,0,0.1); 
            animation: floating 2.5s ease-in-out infinite;
            image-rendering: pixelated;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .date-tag {
            font-size: 11px;
            color: var(--primary-dark);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        h1 { color: var(--text); font-size: 19px; margin-bottom: 20px; }
        .message-box { color: #555; font-size: 15px; line-height: 1.7; min-height: 100px; }

        .btn-open {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 133, 161, 0.3);
        }

        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 20;
            animation: fly 2s ease-out forwards;
        }

        @keyframes fly {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="blob" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="blob" style="width: 300px; height: 300px; bottom: -50px; right: -50px; background: #ffcad4;"></div>

    <div class="card">
        <div class="pixel-heart"></div>
        <span class="date-tag" id="dateDisplay"></span>
        <h1 id="title">¿Qué te quiero decir hoy?</h1>
        <div class="message-box" id="msg"></div>
        <button class="btn-open" id="btn">Ver mensaje</button>
    </div>

    <script>
        // Bases de datos para el generador
        const intros = ["Hoy quería recordarte que ", "Nunca olvides que ", "Simplemente paso a decirte que ", "Me di cuenta de que "];
        const cualidades = ["tu forma de ser es única", "tenés una luz que ilumina todo", "sos la persona más especial", "tu sonrisa hace todo mejor", "hacés que el mundo sea más lindo"];
        const finales = [" y me hacés muy feliz. ❤", " y te merecés lo mejor del mundo. ✨", " y agradezco tenerte en mi vida. 🌸", ". ¡Te quiero muchísimo! 💖"];

        // Función para generar un número "aleatorio" pero fijo por día
        function getDailyMessage() {
            const today = new Date();
            const seed = today.getFullYear() + today.getMonth() + today.getDate();
            
            // Usamos el "seed" para elegir siempre lo mismo durante las 24hs
            const i = seed % intros.length;
            const c = (seed + 1) % cualidades.length;
            const f = (seed + 2) % finales.length;
            
            return intros[i] + cualidades[c] + finales[f];
        }

        const btn = document.getElementById('btn');
        const msgBox = document.getElementById('msg');
        const dateDisplay = document.getElementById('dateDisplay');
        const hoy = new Date();

        dateDisplay.innerText = hoy.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });

        function explode() {
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.innerHTML = '❤';
                p.className = 'particle';
                p.style.left = '50%'; p.style.top = '50%';
                const angle = Math.random() * Math.PI * 2;
                const dist = 150 + Math.random() * 150;
                p.style.setProperty('--mx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--my', Math.sin(angle) * dist + 'px');
                p.style.color = i % 2 === 0 ? '#ff85a1' : '#ffb3c1';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            document.getElementById('title').innerText = "Con amor para vos";
            explode();
            
            const texto = getDailyMessage();
            let index = 0;
            function escribir() {
                if (index < texto.length) {
                    msgBox.innerHTML += texto.charAt(index);
                    index++;
                    setTimeout(escribir, 50);
                }
            }
            escribir();
        });
    </script>
</body>
</html>
