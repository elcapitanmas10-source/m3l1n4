<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD_LEVEL_UP</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #fff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor Principal Estilo Consola */
        .console-container {
            width: 90%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.8);
            border: 4px solid #fff;
            padding: 20px;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Pantalla de Texto con Scroll oculto */
        .screen {
            background: #1a1a1a;
            border: 4px solid #444;
            padding: 20px;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
            overflow-y: auto; /* Permite scroll si el mensaje es largo */
            scrollbar-width: none; /* Oculta scroll en Firefox */
        }

        .screen::-webkit-scrollbar { display: none; } /* Oculta scroll en Chrome/Safari */

        .pixel-portrait {
            width: 64px;
            height: 64px;
            background: #ff6b6b;
            margin: 0 auto 15px;
            box-shadow: 
                0 -4px 0 #000, 0 4px 0 #000, 
                -4px 0 0 #000, 4px 0 0 #000,
                0 -8px 0 #ff6b6b, 0 8px 0 #ff6b6b,
                -8px 0 0 #ff6b6b, 8px 0 0 #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }

        h1 { font-size: 14px; text-align: center; color: #00ffcc; text-shadow: 2px 2px #000; }

        #dialogue {
            font-size: 11px;
            line-height: 1.6;
            color: #fff;
            word-wrap: break-word;
        }

        /* Botón Estilo Arcade */
        .btn-start {
            display: block;
            margin: 20px auto 0;
            background: #ff0055;
            color: #fff;
            padding: 12px 20px;
            border: none;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            box-shadow: 0 6px 0 #990033;
            transition: all 0.1s;
        }

        .btn-start:active {
            box-shadow: 0 0 0 #990033;
            transform: translateY(6px);
        }

        .hidden { display: none; }

        /* Partículas */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="console-container">
        <div class="screen">
            <div class="pixel-portrait" id="icon"></div>
            <h1 id="header">PLAYER 1 READY?</h1>
            <div id="dialogue"></div>
        </div>
        <button class="btn-start" id="actionBtn">PRESS START</button>
    </div>

    <script>
        const dialogueBox = document.getElementById('dialogue');
        const actionBtn = document.getElementById('actionBtn');
        const header = document.getElementById('header');
        const icon = document.getElementById('icon');

        const message = "¡Feliz Cumpleaños! ❤\n\nEres la persona más especial de mi mundo. Quería darte algo diferente, como nosotros.\n\nEspero que este nuevo 'level' venga lleno de items positivos y mucha felicidad. ¡Te quiero muchísimo!";

        let index = 0;

        function typeWriter() {
            if (index < message.length) {
                // Traducir saltos de línea a HTML
                const char = message.charAt(index);
                dialogueBox.innerHTML += char === "\n" ? "<br>" : char;
                index++;
                // Auto-scroll hacia abajo mientras escribe
                document.querySelector('.screen').scrollTop = document.querySelector('.screen').scrollHeight;
                setTimeout(typeWriter, 40);
            }
        }

        function spawnParticles() {
            for(let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.opacity = Math.random();
                document.body.appendChild(p);
                
                // Movimiento simple
                let speed = Math.random() * 2 + 1;
                setInterval(() => {
                    let top = parseFloat(p.style.top);
                    p.style.top = (top + 0.1 * speed) + 'vh';
                    if(top > 100) p.style.top = '-5vh';
                }, 20);
            }
        }

        actionBtn.addEventListener('click', () => {
            actionBtn.style.display = 'none';
            header.innerText = "MESSAGE RECEIVED:";
            icon.style.background = "#00ffcc"; // Cambia color al activar
            typeWriter();
            spawnParticles();
        });
    </script>
</body>
</html>
