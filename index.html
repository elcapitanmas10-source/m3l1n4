<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial ❤</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a1;
            --primary-dark: #ff5c8d;
            --text: #4a4a4a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fdfcfb;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* FONDO DE BLOBS (Ahora más visibles) */
        .blobs-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .blob {
            position: absolute;
            background: var(--primary);
            filter: blur(60px);
            border-radius: 50%;
            opacity: 0.3;
            animation: move 15s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.2); }
        }

        /* TARJETA */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 40px 25px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            border: 2px solid white;
            position: relative;
            z-index: 10;
        }

        /* CORAZÓN PIXEL ART */
        .pixel-heart {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            background-color: var(--primary);
            clip-path: polygon(0 30%, 0 50%, 15% 70%, 50% 100%, 85% 70%, 100% 50%, 100% 30%, 80% 10%, 60% 10%, 50% 25%, 40% 10%, 20% 10%);
            box-shadow: inset -6px -6px 0px rgba(0,0,0,0.15); 
            animation: floating 2.5s ease-in-out infinite;
            image-rendering: pixelated;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 { color: var(--text); font-size: 20px; margin-bottom: 20px; }
        .message-box { color: #555; font-size: 15px; line-height: 1.7; min-height: 90px; }

        .btn-open {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 133, 161, 0.3);
            transition: 0.3s;
        }

        .btn-open:hover { transform: scale(1.05); background: var(--primary-dark); }

        /* PARTÍCULAS DE EXPLOSIÓN */
        .particle {
            position: absolute;
            top: 50%;
            left: 50%;
            pointer-events: none;
            z-index: 20;
            font-size: 24px;
            animation: fly 2s ease-out forwards;
        }

        @keyframes fly {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="blobs-container">
        <div class="blob" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
        <div class="blob" style="width: 350px; height: 350px; bottom: -50px; right: -50px; background: #ffcad4; animation-delay: -5s;"></div>
    </div>

    <div class="card">
        <div class="pixel-heart"></div>
        <h1 id="title">¡Hola! Tengo algo para vos...</h1>
        <div class="message-box" id="msg"></div>
        <button class="btn-open" id="btn">Tocá acá</button>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const msg = document.getElementById('msg');
        const title = document.getElementById('title');

        const texto = "¡Feliz Cumpleaños! ❤\n\nSos una persona increíble y te merecés todo lo lindo del mundo. Espero que te guste este detalle pensado para vos.\n\n¡Te quiero mucho!";

        function explode() {
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.innerHTML = ['❤','✨','🌸'][Math.floor(Math.random()*3)];
                p.className = 'particle';
                
                // Calculamos direcciones aleatorias
                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 200;
                const mx = Math.cos(angle) * dist + 'px';
                const my = Math.sin(angle) * dist + 'px';
                
                p.style.setProperty('--mx', mx);
                p.style.setProperty('--my', my);
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        let i = 0;
        function escribir() {
            if (i < texto.length) {
                msg.innerHTML += texto.charAt(i) === "\n" ? "<br>" : texto.charAt(i);
                i++;
                setTimeout(escribir, 40);
            }
        }

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            title.innerText = "¡Feliz Cumple!";
            explode();
            escribir();
        });
    </script>
</body>
</html>
