<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Vos ❤</title>
    <link rel="icon" href="https://fav.farm/❤" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ff85a1; --primary-dark: #ff5c8d; --text: #4a4a4a; }
        body, html { height: 100%; margin: 0; font-family: 'Quicksand', sans-serif; display: flex; justify-content: center; align-items: center; background: #fdfcfb; overflow: hidden; }
        
        /* Fondo Animado */
        .blob { position: absolute; background: var(--primary); filter: blur(60px); border-radius: 50%; opacity: 0.15; z-index: 1; animation: move 15s infinite alternate ease-in-out; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }
        
        /* Tarjeta Principal */
        .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 35px; padding: 40px 25px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1); border: 2px solid white; position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        
        .pixel-heart { width: 70px; height: 70px; margin-bottom: 20px; background-color: var(--primary); clip-path: polygon(0 30%, 0 50%, 15% 70%, 50% 100%, 85% 70%, 100% 50%, 100% 30%, 80% 10%, 60% 10%, 50% 25%, 40% 10%, 20% 10%); box-shadow: inset -6px -6px 0px rgba(0,0,0,0.1); animation: floating 2.5s ease-in-out infinite; image-rendering: pixelated; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        h1 { color: var(--text); font-size: 20px; margin: 10px 0; }
        .cumple-text { color: #555; font-size: 15px; line-height: 1.6; display: none; white-space: pre-line; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 16px 35px; border-radius: 50px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 133, 161, 0.3); font-family: 'Quicksand', sans-serif; transition: 0.3s; }
        
        /* Botón Flotante Mensaje Diario */
        .floating-btn { position: fixed; bottom: -100px; right: 30px; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 133, 161, 0.3); z-index: 100; display: flex; align-items: center; gap: 8px; transition: bottom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Modales */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 320px; text-align: center; }
        
        .particle { position: absolute; pointer-events: none; z-index: 300; animation: fly 2s ease-out forwards; }
        @keyframes fly { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <div class="blob" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    
    <div class="card" id="mainCard">
        <div class="pixel-heart"></div>
        <h1 id="mainTitle">Tengo algo para vos...</h1>
        <p class="cumple-text" id="cumpleMsg">
            ¡Feliz Cumpleaños! ❤
            
            Espero que pases un día increíble. 
            Sos una persona única y te deseo lo mejor hoy y siempre.
            
            ¡Te quiero mucho!
        </p>
        <button class="btn-main" id="startBtn">Tocá acá</button>
    </div>

    <button class="floating-btn" id="dailyBtn"><span id="btnDate"></span> ✨</button>

    <div class="overlay" id="overlay">
        <div class="modal" id="dailyModal">
            <h2 id="modalDate" style="font-size: 16px; color: var(--primary); margin-top: 0;"></h2>
            <p id="dailyMsg" style="font-size: 14px; color: #444; line-height: 1.6;"></p>
            <button class="btn-main" style="padding: 10px 20px; font-size: 12px;" onclick="document.getElementById('overlay').style.display='none'">Cerrar</button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const cumpleMsgElement = document.getElementById('cumpleMsg');
        const mainTitle = document.getElementById('mainTitle');
        const dailyBtn = document.getElementById('dailyBtn');
        const hoy = new Date();

        // 1. Lógica del Botón Inicial
        startBtn.addEventListener('click', (e) => {
            startBtn.style.display = 'none';
            mainTitle.innerText = "¡Feliz Cumple!";
            cumpleMsgElement.style.display = 'block';
            setTimeout(() => { dailyBtn.style.bottom = '30px'; }, 1000);
            explode(e.clientX, e.clientY);
        });

        // 2. Generador de Chamuyos Diarios (Combinaciones aleatorias fijas por día)
        const intros = [
            "Solo pasaba para recordarte que ", 
            "Nunca te olvides que ", 
            "Paso a decirte que ", 
            "Hoy pensaba en que "
        ];
        const halagos = [
            "sos hermosa", 
            "tu sonrisa me enamora", 
            "sos una mujer única", 
            "tenés una luz especial", 
            "sos lo más lindo del día"
        ];
        const cierres = [
            " y te quiero mucho. ✨", 
            " y me encanta verte todos los días. 😊", 
            ". ¡No dejes de sonreír! 🌸", 
            ". Sos increíble. 💖"
        ];

        document.getElementById('btnDate').innerText = hoy.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });

        dailyBtn.addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'flex';
            
            // Semilla para que el mensaje cambie cada 24hs
            const seed = hoy.getFullYear() + hoy.getMonth() + hoy.getDate();
            const msg = intros[seed % intros.length] + halagos[(seed + 1) % halagos.length] + cierres[(seed + 2) % cierres.length];
            
            document.getElementById('modalDate').innerText = "Mensaje del " + hoy.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
            document.getElementById('dailyMsg').innerText = msg;
        });

        function explode(x, y) {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.innerHTML = '❤'; p.className = 'particle';
                p.style.left = x + 'px'; p.style.top = y + 'px';
                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 100;
                p.style.setProperty('--mx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--my', Math.sin(angle) * dist + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }
    </script>
</body>
</html>
