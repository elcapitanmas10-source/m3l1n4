<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a1;
            --secondary: #fce4ec;
            --text: #4a4a4a;
        }

        body {
            background-color: #f0f2f5;
            background-image: radial-gradient(#ffcad4 0.5px, #f0f2f5 0.5px);
            background-size: 20px 20px; /* Fondo de puntos sutil */
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Tarjeta con sombreado moderno y bordes redondeados */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            z-index: 10;
        }

        /* Ilustración Pixel Art (Corazón estilizado con sombras) */
        .pixel-art-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            position: relative;
            image-rendering: pixelated;
        }

        .heart-pixel {
            width: 100%;
            height: 100%;
            background-color: var(--primary);
            /* Dibujo de corazón mediante clip-path o sombras */
            clip-path: polygon(0 30%, 0 50%, 15% 70%, 50% 100%, 85% 70%, 100% 50%, 100% 30%, 80% 10%, 60% 10%, 50% 25%, 40% 10%, 20% 10%);
            box-shadow: inset -6px -6px 0px rgba(0,0,0,0.1); /* Sombreado interno */
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: var(--text);
            font-size: 22px;
            margin-bottom: 15px;
        }

        .message-box {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            min-height: 80px;
            margin-bottom: 20px;
        }

        .btn-open {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 133, 161, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-open:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(255, 133, 161, 0.5);
        }

        .btn-open:active {
            transform: translateY(0);
        }

        /* Decoración de fondo */
        .circle {
            position: absolute;
            z-index: 1;
            border-radius: 50%;
            background: var(--secondary);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <!-- Círculos decorativos de fondo -->
    <div class="circle" style="width: 200px; height: 200px; top: -50px; right: -50px;"></div>
    <div class="circle" style="width: 150px; height: 150px; bottom: -30px; left: -30px; background: #e3f2fd;"></div>

    <div class="card">
        <div class="pixel-art-container">
            <div class="heart-pixel"></div>
        </div>
        <h1 id="title">Tengo algo para decirte...</h1>
        <div class="message-box" id="msg"></div>
        <button class="btn-open" id="btn">Toca aquí</button>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const msg = document.getElementById('msg');
        const title = document.getElementById('title');

        const texto = "¡Feliz Cumpleaños! ❤\n\nEres una persona increíble y quería que tuvieras algo tan único como tú. Gracias por estar en mi vida. ¡Te quiero muchísimo!";

        let i = 0;
        function escribir() {
            if (i < texto.length) {
                msg.innerHTML += texto.charAt(i) === "\n" ? "<br>" : texto.charAt(i);
                i++;
                setTimeout(escribir, 40);
            }
        }

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            title.innerText = "¡Muchas Felicidades!";
            escribir();
        });
    </script>
</body>
</html>
